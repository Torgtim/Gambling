<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Gambling Website</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .game-card {
            background: #2d2d2d;
            border: 2px solid #d4af37;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        button {
            background: #d4af37;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        button:hover { background: #f1c40f; }
        input { padding: 8px; border-radius: 5px; border: none; margin: 5px; }
        
        /* Lykkehjul spesifikt */
        #wheel-canvas { border: 5px solid #fff; border-radius: 50%; margin: 10px 0; }
        
        .result { font-size: 1.2rem; margin-top: 10px; color: #f1c40f; height: 1.5em; }
        .dice-container { font-size: 3rem; }
    </style>
</head>
<body>

    <h1>🎰 SUPER CASINO 2026 🎰</h1>
    <p>Velkommen! (Dette er kun for underholdning, ingen ekte penger involvert).</p>

    <div class="container">
        
        <div class="game-card">
            <h3>🎡 Spinn Hjulet</h3>
            <canvas id="wheel-canvas" width="250" height="250"></canvas>
            <br>
            <input type="text" id="wheel-items" value="Premie 1, Tap, Jackpot, Prøv Igjen" style="width: 80%;">
            <br>
            <button onclick="spinWheel()">SPINN!</button>
            <div id="wheel-result" class="result"></div>
        </div>

        <div class="game-card">
            <h3>🎲 Terningkast</h3>
            <div id="dice-display" class="dice-container">⚀</div>
            <div id="dice-list"></div>
            <button onclick="rollDice()">Kast Terning</button>
            <button onclick="addDice()">+ Legg til terning</button>
            <button onclick="resetDice()" style="background: #c0392b;">Reset</button>
        </div>

        <div class="game-card">
            <h3>🪙 Myntkast</h3>
            <div id="coin-visual" style="font-size: 3rem;">❓</div>
            <button onclick="flipCoin()">Kron eller Mynt?</button>
            <div id="coin-result" class="result"></div>
        </div>

        <div class="game-card">
            <h3>🎰 Spilleautomat</h3>
            <div id="slots" style="font-size: 2.5rem; letter-spacing: 10px;">❓ | ❓ | ❓</div>
            <button onclick="playSlots()">Dra i spaken!</button>
            <div id="slots-result" class="result"></div>
        </div>

        <div class="game-card">
            <h3>🃏 Høyere eller Lavere?</h3>
            <p>Nåværende tall: <span id="hl-number" style="font-size: 1.5rem; color: #d4af37;">50</span></p>
            <button onclick="guessHL('higher')">Høyere ↑</button>
            <button onclick="guessHL('lower')">Lavere ↓</button>
            <div id="hl-result" class="result"></div>
        </div>

        <div class="game-card">
            <h3>🚀 Crash (Multiplikator)</h3>
            <div id="crash-multiplier" style="font-size: 2rem;">1.00x</div>
            <button id="crash-btn" onclick="startCrash()">Start Flyvning</button>
            <button id="cashout-btn" onclick="cashOut()" disabled>CASH OUT</button>
            <div id="crash-result" class="result"></div>
        </div>

        <div class="game-card">
            <h3>🔴 Velg Farge</h3>
            <button onclick="betColor('Rød')" style="background: #e74c3c;">Rød</button>
            <button onclick="betColor('Svart')" style="background: #2c3e50;">Svart</button>
            <button onclick="betColor('Grønn')" style="background: #27ae60;">Grønn</button>
            <div id="color-result" class="result"></div>
        </div>

    </div>

    <script>
        // --- 1. LYKKEHJUL LOGIKK ---
        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');
        let currentRotation = 0;

        function drawWheel() {
            const items = document.getElementById('wheel-items').value.split(',');
            const sliceAngle = (2 * Math.PI) / items.length;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            items.forEach((item, i) => {
                ctx.beginPath();
                ctx.fillStyle = i % 2 === 0 ? '#d4af37' : '#2c3e50';
                ctx.moveTo(125, 125);
                ctx.arc(125, 125, 120, i * sliceAngle, (i + 1) * sliceAngle);
                ctx.fill();
                ctx.save();
                ctx.translate(125, 125);
                ctx.rotate(i * sliceAngle + sliceAngle / 2);
                ctx.fillStyle = "white";
                ctx.fillText(item.trim(), 50, 5);
                ctx.restore();
            });
        }
        drawWheel();
        document.getElementById('wheel-items').addEventListener('input', drawWheel);

        function spinWheel() {
            const resultDiv = document.getElementById('wheel-result');
            const items = document.getElementById('wheel-items').value.split(',');
            const randomSpin = Math.floor(Math.random() * 360) + 1440; 
            currentRotation += randomSpin;
            canvas.style.transition = "transform 3s cubic-bezier(0.17, 0.67, 0.12, 0.99)";
            canvas.style.transform = `rotate(${currentRotation}deg)`;
            
            setTimeout(() => {
                const actualDegree = currentRotation % 360;
                const index = Math.floor((360 - actualDegree) / (360 / items.length)) % items.length;
                resultDiv.innerText = "Du vant: " + items[index].trim();
            }, 3000);
        }

        // --- 2. TERNING ---
        let diceCount = 1;
        const diceIcons = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
        function rollDice() {
            const display = document.getElementById('dice-display');
            let results = [];
            for(let i=0; i<diceCount; i++) {
                results.push(diceIcons[Math.floor(Math.random() * 6)]);
            }
            display.innerText = results.join(' ');
        }
        function addDice() { diceCount++; rollDice(); }
        function resetDice() { diceCount = 1; rollDice(); }

        // --- 3. MYNTKAST ---
        function flipCoin() {
            const res = Math.random() < 0.5 ? "KRON" : "MYNT";
            document.getElementById('coin-visual').innerText = res === "KRON" ? "🟡" : "🥈";
            document.getElementById('coin-result').innerText = "Det ble " + res + "!";
        }

        // --- 4. SLOTS ---
        const symbols = ['🍒', '🍋', '🔔', '💎', '7️⃣'];
        function playSlots() {
            const s1 = symbols[Math.floor(Math.random()*5)];
            const s2 = symbols[Math.floor(Math.random()*5)];
            const s3 = symbols[Math.floor(Math.random()*5)];
            document.getElementById('slots').innerText = `${s1} | ${s2} | ${s3}`;
            if(s1 === s2 && s2 === s3) {
                document.getElementById('slots-result').innerText = "JACKPOT! 🎉";
            } else {
                document.getElementById('slots-result').innerText = "Prøv igjen!";
            }
        }

        // --- 5. HØYERE/LAVERE ---
        let currentHL = 50;
        function guessHL(choice) {
            const nextNum = Math.floor(Math.random() * 100);
            let win = (choice === 'higher' && nextNum > currentHL) || (choice === 'lower' && nextNum < currentHL);
            document.getElementById('hl-result').innerText = `Det ble ${nextNum}. ${win ? 'Du vant!' : 'Du tapte!'}`;
            currentHL = nextNum;
            document.getElementById('hl-number').innerText = currentHL;
        }

        // --- 6. CRASH ---
        let crashVal = 1.0;
        let crashInterval;
        let isCrashed = false;
        function startCrash() {
            isCrashed = false;
            crashVal = 1.0;
            document.getElementById('crash-result').innerText = "";
            document.getElementById('crash-btn').disabled = true;
            document.getElementById('cashout-btn').disabled = false;
            
            const limit = Math.random() * 5 + 1; // Crasher mellom 1 og 6
            crashInterval = setInterval(() => {
                crashVal += 0.05;
                document.getElementById('crash-multiplier').innerText = crashVal.toFixed(2) + "x";
                if(crashVal >= limit) {
                    clearInterval(crashInterval);
                    isCrashed = true;
                    document.getElementById('crash-multiplier').style.color = "red";
                    document.getElementById('crash-result').innerText = "BOOM! Du crashet.";
                    document.getElementById('crash-btn').disabled = false;
                    document.getElementById('cashout-btn').disabled = true;
                }
            }, 100);
        }
        function cashOut() {
            if(!isCrashed) {
                clearInterval(crashInterval);
                document.getElementById('crash-result').innerText = `Du cashet ut på ${crashVal.toFixed(2)}x!`;
                document.getElementById('crash-btn').disabled = false;
                document.getElementById('cashout-btn').disabled = true;
            }
        }

        // --- 7. FARGE-VELGER ---
        function betColor(choice) {
            const colors = ['Rød', 'Svart', 'Grønn'];
            const r = Math.random();
            const winningColor = r < 0.05 ? 'Grønn' : (r < 0.52 ? 'Rød' : 'Svart');
            document.getElementById('color-result').innerText = `Vinnerfarge: ${winningColor}. ${choice === winningColor ? 'Gevinst!' : 'Tap.'}`;
        }
    </script>
</body>
</html>
