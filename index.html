<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG Tech Casino - Extreme Edition</title>
    <style>
        :root {
            --gold: #ffcc00;
            --dark-bg: #0a0a0a;
            --card-bg: #151515;
            /* Høy-kontrast farger for hjulet */
            --wheel-1: #ff0000; /* Knall rød */
            --wheel-2: #000000; /* Svart */
            --wheel-3: #00ff00; /* Grønn */
            --wheel-4: #0088ff; /* Blå */
        }

        body {
            font-family: 'Arial Black', sans-serif;
            background-color: var(--dark-bg);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: var(--card-bg);
            border: 3px solid #333;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            position: relative;
        }

        /* --- EKTE MYNT CSS --- */
        .coin-container {
            perspective: 1000px;
            width: 120px;
            height: 120px;
            margin: 20px auto;
        }
        #coin {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .coin-side {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            border: 6px solid #b8860b;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        .heads { background: linear-gradient(45deg, #ffd700, #daa520); color: #5c4033; }
        .tails { background: linear-gradient(45deg, #c0c0c0, #808080); color: #333; transform: rotateY(180deg); }

        /* --- HJULET --- */
        .wheel-wrapper { position: relative; margin: 20px 0; }
        .wheel-arrow {
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent;
            border-top: 35px solid #ff0000; z-index: 10; filter: drop-shadow(0 0 5px black);
        }

        button {
            background: var(--gold); border: none; padding: 12px 20px; border-radius: 8px;
            cursor: pointer; font-weight: bold; color: #000; margin: 5px; font-size: 1rem;
        }
        button:hover { filter: brightness(1.2); transform: scale(1.05); }
        .btn-reset { background: #444; color: white; }

        .display-box { 
            font-size: 2.5rem; background: #000; padding: 20px; 
            border-radius: 10px; margin: 15px 0; border: 1px solid #333;
        }

        footer { margin-top: 50px; opacity: 0.5; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1 style="color: var(--gold); font-size: 3rem; margin-bottom: 5px;">TG TECH CASINO</h1>
    <p style="margin-bottom: 40px;">v4.0 Extreme Edition</p>

    <div class="container">
        
        <div class="game-card">
            <h3>🎡 High-Contrast Wheel</h3>
            <div class="wheel-wrapper">
                <div class="wheel-arrow"></div>
                <canvas id="wheel-canvas" width="280" height="280"></canvas>
            </div>
            <input type="text" id="wheel-items" value="JACKPOT, TAP, 500kr, TAP, BONUS, TAP" style="width: 90%; background: #222; color: white; border: 1px solid #444; padding: 5px;">
            <button onclick="spinWheel()">SPINN!</button>
            <div id="wheel-result" style="color: var(--gold); font-weight: bold; margin-top: 10px;"></div>
        </div>

        <div class="game-card">
            <h3>🪙 Real Coin Flip</h3>
            <div class="coin-container">
                <div id="coin">
                    <div class="coin-side heads">Kr</div>
                    <div class="coin-side tails">M</div>
                </div>
            </div>
            <button onclick="flipCoin()">KAST MYNT</button>
            <button class="btn-reset" onclick="resetCoin()">RESET</button>
            <div id="coin-result" style="color: var(--gold); margin-top: 10px; font-weight: bold;"></div>
        </div>

        <div class="game-card">
            <h3>🎲 Dice</h3>
            <div id="dice-display" class="display-box">⚀</div>
            <button onclick="rollDice()">KAST</button>
            <button onclick="addDice()">+ TERNING</button>
            <button class="btn-reset" onclick="resetDice()">RESET</button>
        </div>

        <div class="game-card">
            <h3>🚀 Crash Rocket</h3>
            <div id="crash-multiplier" class="display-box">1.00x</div>
            <button id="crash-btn" onclick="startCrash()">START FLYVNING</button>
            <button id="cashout-btn" onclick="cashOut()" disabled style="background: #00ff00;">CASH OUT</button>
            <div id="crash-result" style="font-weight: bold; margin-top: 10px;"></div>
        </div>

        <div class="game-card">
            <h3>🎰 TG Slots</h3>
            <div id="slots-display" class="display-box">🎰🎰🎰</div>
            <button onclick="playSlots()">DRA I SPAKEN</button>
        </div>

    </div>

    <footer>Laget av TG tech ©</footer>

    <script>
        // --- LYD ENGINE ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type, dur, vol) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        // --- 1. DET AVANSERTE HJULET ---
        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');
        let currentRotation = 0;
        let isSpinning = false;

        function drawWheel() {
            const items = document.getElementById('wheel-items').value.split(',').map(i => i.trim());
            const slice = (2 * Math.PI) / items.length;
            const colors = ['#ff0000', '#000000', '#00ff00', '#0088ff'];

            ctx.clearRect(0, 0, 280, 280);
            items.forEach((text, i) => {
                ctx.beginPath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.moveTo(140, 140);
                ctx.arc(140, 140, 130, i * slice, (i + 1) * slice);
                ctx.fill();
                ctx.lineWidth = 2; ctx.strokeStyle = "#fff"; ctx.stroke();
                
                ctx.save();
                ctx.translate(140, 140);
                ctx.rotate(i * slice + slice/2);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 14px Arial";
                ctx.fillText(text, 50, 5);
                ctx.restore();
            });
        }
        drawWheel();
        document.getElementById('wheel-items').addEventListener('input', drawWheel);

        function spinWheel() {
            if(isSpinning) return;
            isSpinning = true;
            document.getElementById('wheel-result').innerText = "";
            
            let speed = Math.random() * 0.2 + 0.3; // Tilfeldig startfart
            let rotation = currentRotation;
            const friction = 0.985; // Sakte ned gradvis
            const items = document.getElementById('wheel-items').value.split(',');
            const sliceDeg = 360 / items.length;
            
            let lastSegment = -1;

            function animate() {
                speed *= friction;
                rotation += speed;
                canvas.style.transform = `rotate(${rotation}rad)`;

                // Tikk-lyd logikk: Sjekk når en ny sektor passerer toppen (270 grader / -1.57 rad)
                const currentDeg = (rotation * (180/Math.PI)) % 360;
                const segment = Math.floor((360 - (currentDeg + 90) % 360) / sliceDeg);
                
                if(segment !== lastSegment) {
                    playSound(600, 'sine', 0.05, 0.1); // TIKK!
                    lastSegment = segment;
                }

                if(speed > 0.001) {
                    requestAnimationFrame(animate);
                } else {
                    isSpinning = false;
                    currentRotation = rotation;
                    const finalIndex = Math.floor((360 - (currentDeg + 90) % 360) / sliceDeg) % items.length;
                    document.getElementById('wheel-result').innerText = "LANDET PÅ: " + items[finalIndex].trim();
                    playSound(1000, 'square', 0.3, 0.1);
                }
            }
            animate();
        }

        // --- 2. EKTE MYNT ---
        let coinRotation = 0;
        function flipCoin() {
            const coin = document.getElementById('coin');
            const resultText = document.getElementById('coin-result');
            const isHeads = Math.random() > 0.5;
            
            coinRotation += 1800 + (isHeads ? 0 : 180); 
            coin.style.transform = `rotateY(${coinRotation}deg)`;
            
            playSound(400, 'sine', 0.1, 0.1);
            
            setTimeout(() => {
                resultText.innerText = isHeads ? "DET BLE KRON!" : "DET BLE MYNT!";
                playSound(800, 'sine', 0.2, 0.1);
            }, 1000);
        }
        function resetCoin() {
            coinRotation = 0;
            document.getElementById('coin').style.transform = `rotateY(0deg)`;
            document.getElementById('coin-result').innerText = "";
        }

        // --- 3. TERNINGER ---
        let dCount = 1;
        function rollDice() {
            const d = document.getElementById('dice-display');
            playSound(150, 'sawtooth', 0.1, 0.1);
            d.style.transform = "scale(1.2) rotate(10deg)";
            setTimeout(() => {
                const icons = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
                let r = []; for(let i=0; i<dCount; i++) r.push(icons[Math.floor(Math.random()*6)]);
                d.innerText = r.join(' ');
                d.style.transform = "scale(1) rotate(0deg)";
            }, 200);
        }
        function addDice() { dCount++; rollDice(); }
        function resetDice() { dCount = 1; document.getElementById('dice-display').innerText = "⚀"; }

        // --- 4. CRASH (Med farge-fix) ---
        let cVal = 1.0;
        let cInt;
        function startCrash() {
            cVal = 1.0;
            const disp = document.getElementById('crash-multiplier');
            const res = document.getElementById('crash-result');
            disp.style.color = "white"; // RESET FARGE TIL HVIT
            res.innerText = "";
            document.getElementById('crash-btn').disabled = true;
            document.getElementById('cashout-btn').disabled = false;
            
            const limit = Math.random() * 4 + 1.1;
            cInt = setInterval(() => {
                cVal += cVal * 0.02;
                disp.innerText = cVal.toFixed(2) + "x";
                playSound(100 + (cVal*40), 'triangle', 0.1, 0.03);
                if(cVal >= limit) {
                    clearInterval(cInt);
                    disp.style.color = "red";
                    res.innerText = "BOOM! DU CRASHET.";
                    playSound(60, 'sawtooth', 0.6, 0.2);
                    document.getElementById('crash-btn').disabled = false;
                    document.getElementById('cashout-btn').disabled = true;
                }
            }, 100);
        }
        function cashOut() {
            clearInterval(cInt);
            document.getElementById('crash-result').innerText = "GEVINST: " + cVal.toFixed(2) + "x";
            document.getElementById('crash-btn').disabled = false;
            document.getElementById('cashout-btn').disabled = true;
            playSound(1200, 'sine', 0.3, 0.1);
        }

        // --- 5. SLOTS ---
        function playSlots() {
            const icons = ['🍒', '🍋', '⭐', '💎', '7️⃣'];
            const disp = document.getElementById('slots-display');
            let count = 0;
            const interval = setInterval(() => {
                disp.innerText = icons[Math.floor(Math.random()*5)] + icons[Math.floor(Math.random()*5)] + icons[Math.floor(Math.random()*5)];
                playSound(200 + (count*50), 'square', 0.05, 0.02);
                if(count++ > 15) {
                    clearInterval(interval);
                }
            }, 80);
        }
    </script>
</body>
</html>
